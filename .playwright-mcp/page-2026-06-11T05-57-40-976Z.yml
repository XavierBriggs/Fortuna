          - heading "Liquidation" [level=2] [ref=e320]
          - paragraph [ref=e321]: Liquidation is managed by your broker and occurs when losses on a position consume the collateral down to a minimum threshold — the maintenance margin. The broker closes the position automatically to prevent the account from going negative.
