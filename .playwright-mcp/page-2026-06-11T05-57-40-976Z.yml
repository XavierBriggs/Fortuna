          - strong [ref=e325]: 20%
          - text: adverse move; at
          - strong [ref=e326]: 10×
          - text: ", roughly"
          - strong [ref=e327]: 10%
          - text: . Liquidation is calculated against the
          - strong [ref=e328]: mark price
          - text: — an aggregated reference drawn from multiple spot markets — which reduces the risk of liquidation from brief price spikes on a single exchange.
