        - paragraph [ref=e476]: Trading perpetual futures involves leverage, meaning gains and losses are amplified relative to your account balance. Auto-liquidation mechanisms are designed to limit losses by closing positions when margin thresholds are breached, but they do not function as a guaranteed stop-loss. Rapid or extreme market movements, including gaps in price or periods of illiquidity, may result in execution at prices significantly worse than the liquidation trigger, potentially producing a negative account balance.
        - paragraph [ref=e477]: If your account balance becomes negative, you are liable for the outstanding amount and must deposit additional funds to bring your account to a zero or positive balance. Your open positions may be liquidated without prior notice at any time the Firm determines that your margin is insufficient. The Firm retains the right to terminate an account where a negative balance remains unresolved in accordance with the terms of your customer agreement. Withdrawal of funds may be restricted if you have outstanding obligations.
        - paragraph [ref=e478]: Leveraged trading in perpetual futures is not suitable for all investors. You should carefully consider whether such trading is appropriate for you in light of your financial condition and risk tolerance.
        - paragraph [ref=e479]: Stop prices are not guaranteed execution prices. Stop orders may be triggered by a short-lived, dramatic price change. Sell stop orders may exacerbate price declines during times of extreme volatility. Placing a "limit price" on a stop order may help manage some of these risks.
