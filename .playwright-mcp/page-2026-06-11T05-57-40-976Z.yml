        - generic [ref=e77]:
          - paragraph [ref=e78]:
            - text: Perpetuals track an asset's price. Go
            - strong [ref=e79]: long
            - text: if you expect it to rise,
            - strong [ref=e80]: short
            - text: if you expect it to fall. Unlike a traditional futures contract that expires on a set date, Perpetuals have
            - strong [ref=e81]: no expiry
            - text: — you hold the position as long as your collateral can back it, and close it whenever you choose. No crypto ever changes hands.
          - paragraph [ref=e82]:
            - text: Since perpetual futures never expire and require
            - strong [ref=e83]: less upfront capital
            - text: than traditional futures, they can be a simpler and cheaper way to open a position. Leverage does increase the risk.
          - heading "How Perpetuals compare to spot trading" [level=3] [ref=e84]
          - paragraph [ref=e85]: Spot trading means owning the real asset directly. Perpetuals trade the price instead, with leverage, the ability to go short, an 8-hour funding rate, and built-in liquidation all part of how the contract works.
