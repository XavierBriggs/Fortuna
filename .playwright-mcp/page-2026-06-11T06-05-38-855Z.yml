          - list [ref=e118]:
            - listitem [ref=e119]: Kalshi told CNBC that volumes on its perpetual futures, or “perps,” have crossed $1 billion in trading volume.
            - listitem [ref=e120]: Perps first launched on the platform on Wednesday, and originally saw more than $100 million in trading volumes in 24 hours.
            - listitem [ref=e121]: The asset class was previously not accessible in the U.S., but does $90 trillion in annual global volume.
