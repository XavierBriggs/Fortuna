          - generic [ref=e136]:
            - paragraph [ref=e137]: Prediction market platform Kalshi’s perpetual futures have already crossed $1 billion in trading volume within a week of their launch last week, the company shared exclusively with CNBC.
            - paragraph [ref=e138]:
              - text: The company officially launched trading on
              - link "crypto perpetual futures, or “perps,”" [ref=e139] [cursor=pointer]:
                - /url: https://www.cnbc.com/2026/04/27/prediction-markets-prepare-to-invade-one-of-cryptos-biggest-and-riskiest-trades.html
              - text: on Wednesday, and in the first 24 hours saw more than $100 million in volume. Volumes are notional, which means leverage traders take in their contracts is included in that figure.
            - paragraph [ref=e140]: Perps are futures contracts with no expiration date that allow traders to speculate on a price without owning the underlying asset. Contracts track the price of an asset continuously, with funding payments keeping the perpetual contract price aligned with the market.
            - paragraph [ref=e141]: The asset class has over $90 trillion in annual global volume, according to Bank of America, but before Kalshi there wasn’t a way to trade the contracts in the U.S.
            - paragraph [ref=e142]:
              - emphasis [ref=e143]: (Kalshi CEO Tarek Mansour will make an appearance on CNBC’s “Fast Money” on Tuesday at 5 p.m. ET.)
            - paragraph [ref=e144]:
              - text: Kalshi received
              - link "regulatory approval" [ref=e145] [cursor=pointer]:
                - /url: https://www.cnbc.com/2026/05/29/kalshi-is-moving-beyond-prediction-markets-and-into-one-of-cryptos-biggest-trading-lanes.html
              - text: from the Commodity Futures Trading Commission on May 29 to be the first company in the U.S. to offer perp contracts.
              - generic [ref=e146]:
                - link "Coinbase" [ref=e147] [cursor=pointer]:
                  - /url: /quotes/COIN/
                - button "Add To Watchlist" [ref=e150] [cursor=pointer]
              - text: on the same day also received approval from regulators to offer its U.S. traders access to global perp contracts through an affiliate.
            - paragraph [ref=e152]: Pent up domestic demand has been reflected on Kalshi since the launch. A spokesperson said that at one point the waitlist to access perps on the platform had more than 1 million people on it, and that it’s the fastest growing product in the company’s history. It took Kalshi 40 months to see $1 billion in trading volumes across its event contracts.
            - paragraph [ref=e153]: Perpetuals marked the company’s biggest product launch since it first launched its prediction markets.
            - paragraph [ref=e154]:
              - emphasis [ref=e155]: "Disclosure: CNBC and Kalshi have a commercial relationship that includes customer acquisition and a minority investment."
