# Copy to config/fortuna.toml (gitignored). Secrets come from env, never this file.

[gates.global]
max_total_exposure_cents = 800_000   # 80% of a $10k account
max_daily_loss_cents     = 50_000    # drawdown halt: realized + conservative-mark unrealized, day = 00:00 UTC
min_order_contracts      = 1
max_order_contracts      = 1_000
price_band_cents         = 20        # check 4: |limit - reference| bound (yes-space)
max_cross_cents          = 5         # check 4: max marketable crossing beyond the touch
per_market_exposure_cents = 100_000  # check 3 (per-market arm)
per_event_exposure_cents  = 150_000  # check 9 (same-event cap via edges)
require_event_mapping     = false    # check 9: true once discovery maps events (Phase 3)

[gates.per_strategy.mech_structural]
max_exposure_cents = 200_000
max_order_notional_cents = 10_000
min_net_edge_bps = 100

[gates.per_strategy.mech_extremes]
max_exposure_cents = 150_000
max_order_notional_cents = 5_000
min_net_edge_bps = 150

# The opt-in [synthesis] arm's per-strategy gate (S5b): without it a composed
# synthesis order is rejected fail-closed.
[gates.per_strategy.synthesis]
max_exposure_cents = 200_000
max_order_notional_cents = 10_000
min_net_edge_bps = 100

# I3 dual token buckets. Researched Kalshi limits (2026-06-09): Basic tier
# ~10 write req/s with a 2s burst window; these defaults sit far below that.
[gates.rate.kalshi]
burst = 5
sustained_per_min = 20
market_burst = 3
market_sustained_per_min = 10

[gates.rate.sim]
burst = 100
sustained_per_min = 600
market_burst = 50
market_sustained_per_min = 300

[envelopes]                # spec 5.14: the ONLY capital allocation tier
mech_structural_cents = 300_000
mech_extremes_cents   = 200_000
synthesis_cents       = 200_000   # the opt-in [synthesis] arm's capital (S5b)

[sizing]
kelly_fraction = 0.25

# spec 5.2: fee schedules are data, verified per fill.
# Values grounded in docs/research/venue/kalshi-fees-2026-06-09 (official PDF
# effective 2026-02-05): taker ceil(0.07*C*P*(1-P)); maker 0.0175 (charged only
# on fee_type=quadratic_with_maker_fees series); per-series fee_multiplier
# (x0.5 S&P500/Nasdaq-100 family, x0 promos) maps to category_multipliers via
# the adapter's series->category mapping (T1.1). Rounding "up" = ceil per fill
# (the conservative model of Kalshi's per-order accumulator).
[fees.kalshi]
formula = "quadratic"      # fee = coeff * contracts * p * (1-p), p = price/$1
taker_coeff = "0.07"
maker_coeff = "0.0175"
effective_date = "2026-02-05"
[fees.kalshi.category_multipliers]
sp500_nasdaq_range = "0.5"

# Polymarket US (live since 2025-12-03; schedule effective 2026-04-03 per
# docs/research/venue/polymarket-fees-2026-06-09): taker 0.05 quadratic,
# maker -0.0125 (per-fill REBATE), banker's rounding documented by the venue.
[fees.polymarket_us]
formula = "quadratic"
taker_coeff = "0.05"
maker_coeff = "-0.0125"
rounding = "half_even"
effective_date = "2026-04-03"

[slack]                    # channel ids from env: FORTUNA_SLACK_*
channels = ["trading", "alerts", "review", "digest", "ops"]

[cognition]
synthesis_model = "claude-fable-5"
triage_model = "claude-haiku-4-5"
daily_budget_cents = 1_500
# Hard per-decision-cycle ceiling (spec 5.9): every call one cycle makes
# (including a retry) shares this allowance; breach degrades to
# mechanical-only.
per_cycle_budget_cents = 50
shadow_budget_cents = 500
# Booting WITHOUT ANTHROPIC_API_KEY silently swaps in the stub mind; that
# degrade must be opted into explicitly (T4.1 fail-closed boot).
allow_stub_mind = false

[deadman]
ping_interval_secs = 60

[daemon]                   # T4.1: the live composition daemon
venue = "sim"              # the ONLY bootable venue until kalshi fixture clearance (T4.2)
tick_interval_ms = 1000
halt_poll_ms = 500         # ASSUMPTIONS pin: halt-state poll <= 500ms
metrics_bind = "127.0.0.1:9187"   # GET-only Prometheus; wider exposure is operator config

[sim]                      # the Sim venue's market world (venue = "sim" requires it)
bracket_sets = [["SIM-BKT-LO", "SIM-BKT-MID", "SIM-BKT-HI"]]
