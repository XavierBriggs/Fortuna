# Copy to config/fortuna.toml (gitignored). Secrets come from env, never this file.

# Check 11 (book-age freshness, P2 safety): reject orders priced on a stale
# order book. Opt-in — absent (or commented out) means the check is disabled
# (always passes), preserving byte-identical behaviour for existing configs.
# Set to a value appropriate for your venue's book-update cadence; Kalshi's
# WebSocket books typically update within a few hundred ms, so 5_000 ms is
# already conservative. Values <= 0 are accepted but trivially reject all
# orders backed by a book (use None/absent to disable instead).
# max_book_age_ms = 5_000

[gates.global]
max_total_exposure_cents = 800_000   # 80% of a $10k account
max_daily_loss_cents     = 50_000    # drawdown halt: realized + conservative-mark unrealized, day = 00:00 UTC
min_order_contracts      = 1
max_order_contracts      = 1_000
price_band_cents         = 20        # check 4: |limit - reference| bound (yes-space)
max_cross_cents          = 5         # check 4: max marketable crossing beyond the touch
per_market_exposure_cents = 100_000  # check 3 (per-market arm)
per_event_exposure_cents  = 150_000  # check 9 (same-event cap via edges)
require_event_mapping     = false    # check 9: true once discovery maps events (Phase 3)

[gates.per_strategy.mech_structural]
max_exposure_cents = 200_000
max_order_notional_cents = 10_000
min_net_edge_bps = 100

[gates.per_strategy.mech_extremes]
max_exposure_cents = 150_000
max_order_notional_cents = 5_000
min_net_edge_bps = 150

# The opt-in [synthesis] arm's per-strategy gate (S5b): without it a composed
# synthesis order is rejected fail-closed.
[gates.per_strategy.synthesis]
max_exposure_cents = 200_000
max_order_notional_cents = 10_000
min_net_edge_bps = 100

# The opt-in persona-analysis strategy's per-strategy gate. Persona beliefs are
# attributed to the "domain-analysis" strategy and pass the SAME gate pipeline as
# every other order (I1), but personas are PROPOSE-ONLY (I6) — they emit DATA, no
# orders — so this gate carries ZERO exposure: no capital touches a persona belief
# until the §11 promotion gate passes for a subset (an operator action, never the
# daemon, I7). Uncomment alongside [personas] below to make the boundary explicit.
# [gates.per_strategy.domain-analysis]
# max_exposure_cents = 0           # zero capital: propose-only until promoted (I7)
# max_order_notional_cents = 0
# min_net_edge_bps = 100

# I3 dual token buckets. Researched Kalshi limits (2026-06-09): Basic tier
# ~10 write req/s with a 2s burst window; these defaults sit far below that.
[gates.rate.kalshi]
burst = 5
sustained_per_min = 20
market_burst = 3
market_sustained_per_min = 10

# Paper-on-live uses Kalshi production market data but submits only to the local
# paper ledger. It has its own venue id so gates cannot confuse paper execution
# with a real Kalshi order path.
[gates.rate."paper-live"]
burst = 5
sustained_per_min = 20
market_burst = 3
market_sustained_per_min = 10

[gates.rate.sim]
burst = 100
sustained_per_min = 600
market_burst = 50
market_sustained_per_min = 300

[envelopes]                # spec 5.14: the ONLY capital allocation tier
mech_structural_cents = 300_000
mech_extremes_cents   = 200_000
synthesis_cents       = 200_000   # the opt-in [synthesis] arm's capital (S5b)

[sizing]
kelly_fraction = 0.25

# The opt-in [review] weekly-review GO/NO-GO thresholds (T4.1/M2; spec 5.8).
# ADVISORY ONLY — the weekly review emits recommendations; promotion is a human
# action (I7). Its presence composes the weekly/monthly review cadence. Starting
# values the operator tunes; all three are required (no silent default for a
# risk gate).
[review]
min_paper_days_mechanical = 14         # mechanical: >= 2 weeks of paper before a GO
min_resolved_beliefs_synthesis = 100   # synthesis: >= 100 resolved beliefs (calibration sample)
max_fee_pnl_ratio = 0.5                # NO-GO when fees exceed 50% of realized PnL

# spec 5.2: fee schedules are data, verified per fill.
# Values grounded in docs/research/venue/kalshi-fees-2026-06-09 (official PDF
# effective 2026-02-05): taker ceil(0.07*C*P*(1-P)); maker 0.0175 (charged only
# on fee_type=quadratic_with_maker_fees series); per-series fee_multiplier
# (x0.5 S&P500/Nasdaq-100 family, x0 promos) maps to category_multipliers via
# the adapter's series->category mapping (T1.1). Rounding "up" = ceil per fill
# (the conservative model of Kalshi's per-order accumulator).
[fees.kalshi]
formula = "quadratic"      # fee = coeff * contracts * p * (1-p), p = price/$1
taker_coeff = "0.07"
maker_coeff = "0.0175"
effective_date = "2026-02-05"
[fees.kalshi.category_multipliers]
sp500_nasdaq_range = "0.5"

# Polymarket US (live since 2025-12-03; schedule effective 2026-04-03 per
# docs/research/venue/polymarket-fees-2026-06-09): taker 0.05 quadratic,
# maker -0.0125 (per-fill REBATE), banker's rounding documented by the venue.
[fees.polymarket_us]
formula = "quadratic"
taker_coeff = "0.05"
maker_coeff = "-0.0125"
rounding = "half_even"
effective_date = "2026-04-03"

[slack]                    # channel ids from env: FORTUNA_SLACK_*
channels = ["trading", "alerts", "review", "digest", "ops"]

[cognition]
# Cognition tiers (spec 5.9): each ROLE runs on its own model — synthesis = the
# deep belief-formation tier (the example uses the cheaper fable-5; the struct
# default is Opus), mid = the daily RECONCILIATION on a SEPARATE mind (Sonnet),
# triage = the fast trigger path (Haiku). All share the [cognition] budget rails.
synthesis_model = "claude-fable-5"
mid_model = "claude-sonnet-4-6"
triage_model = "claude-haiku-4-5"
daily_budget_cents = 1_500
# Hard per-decision-cycle ceiling (spec 5.9): every call one cycle makes
# (including a retry) shares this allowance; breach degrades to
# mechanical-only.
per_cycle_budget_cents = 50
shadow_budget_cents = 500
# Booting WITHOUT ANTHROPIC_API_KEY silently swaps in the stub mind; that
# degrade must be opted into explicitly (T4.1 fail-closed boot).
allow_stub_mind = false

[deadman]
ping_interval_secs = 60

# Explicit runtime mode for non-sim compositions. Required when venue="kalshi".
# The safest demo is live Kalshi data with order mutation disabled:
# [runtime]
# stage = "paper"
# execution_mode = "live_data_only" # live_data_only | dry_run | paper_ledger | demo_orders | production_orders
# orders_enabled = false

[daemon]                   # T4.1: the live composition daemon
venue = "sim"              # "sim" (requires stage="sim") or "kalshi" (requires stage="paper")
stage = "sim"              # I7 validation stage: sim | paper | live_min | scaled.
                           # venue="sim" REQUIRES stage="sim". The Kalshi DEMO runs at
                           # stage="paper" (mock funds, real venue); live_min/scaled are
                           # REFUSED at boot — promotion is a human action through the
                           # forward-validation gate (I7), never a config flip.
# Optional composite mode: live Kalshi PROD market data, local paper execution.
# When set, both fields are required exactly as shown; any real execution target
# is refused at boot. Requires PROD read credentials in env:
# KALSHI_API_KEY_ID + KALSHI_PRIVATE_KEY_PATH.
# data_source = "kalshi_prod"
# execution = "paper"
tick_interval_ms = 1000    # for venue="kalshi" raise to >= 5000 (each tick does real HTTP)
halt_poll_ms = 500         # ASSUMPTIONS pin: halt-state poll <= 500ms
metrics_bind = "127.0.0.1:9187"   # GET-only Prometheus; wider exposure is operator config

[sim]                      # the Sim venue's market world (venue = "sim" requires it)
bracket_sets = [["SIM-BKT-LO", "SIM-BKT-MID", "SIM-BKT-HI"]]

# I4 revocation (spec.md:43 "revoke order-placing capability"; open audit C2).
# When set, the daemon watches a durable kill sentinel WRITTEN by the standalone
# `fortuna-killswitch` (its freeze / flatten-perps verbs write it after cancelling)
# and treats its PRESENCE as a global halt that refuses FUTURE order placement.
# Re-arm is out-of-band + restart-gated (I2): the operator runs
# `fortuna-killswitch clear-revocation --journal <path>` AND restarts the daemon.
#
# revocation_file MUST equal the KILLSWITCH_REVOKED sibling of the killswitch
# --journal path — i.e. if you run the switch with `--journal
# /var/run/fortuna/killswitch.jsonl`, the sentinel is
# /var/run/fortuna/KILLSWITCH_REVOKED and that is the value below. Keeping the
# two paths consistent is the OPERATOR's responsibility (the daemon and the
# switch are separate processes; see ASSUMPTIONS.md). Absent => the daemon does
# not watch any sentinel (byte-identical to today — fail closed). Uncomment to wire.
# [killswitch]
# revocation_file = "/var/run/fortuna/KILLSWITCH_REVOKED"

# The Kalshi DEMO arb world (demo-flip Phase 2). Uncomment + set venue = "kalshi"
# and stage = "paper" above to run the daemon against the Kalshi demo (mock funds,
# real venue). REQUIRED then: a non-empty `series` (the trading universe markets
# are listed for) and `bracket_sets` (the mech_structural arb sets — real demo
# tickers that partition each event). The demo CREDENTIALS are env-only, NEVER
# here: KALSHI_API_DEMO_KEY_ID (the key id) + KALSHI_DEMO_PRIVATE_KEY_PATH (the
# filesystem PATH to the RSA private key PEM — the file CONTENT is a SECRET,
# never logged/audited/committed). These are the SAME two vars the fixture
# recorders read. Obtain the key from the Kalshi demo portal, save the PEM to a
# gitignored file, and point the path var at it via .env / an EnvironmentFile.
# Tickers below are
# illustrative placeholders — replace with a demo-account inspection.
# [kalshi]
# series = ["KXHIGHNY"]
# bracket_sets = [["KXHIGHNY-26JUN13-B60", "KXHIGHNY-26JUN13-B63", "KXHIGHNY-26JUN13-B66"]]

# --- Opt-in perp strategies (slice 4c) -------------------------------------
# Both are INERT until a producer injects perp PerpTicks (the live kinetics
# feed, a later sub-slice); their PRESENCE here is what composes them. Absent =>
# not composed (fail closed). Uncomment to enable.
#
# [funding_forecast]        # PRESENCE composes the zero-capital funding belief
#                           # producer (propose-nothing).
# ticker_feed_jsonl = "fixtures/kinetics-perps/ws__public_orderbook_ticker.jsonl"
#                           # slice-4e Sim soak: replay RECORDED kinetics `ticker`
#                           # frames as PerpTicks (one per segment) so the producer
#                           # FIRES and PERSISTS scalar beliefs each segment — the
#                           # Sim loop sources only BookSnapshots, so without a feed
#                           # the producer is inert. Omit for the live kinetics feed.
#
# [perp_event_basis]        # PRESENCE composes the propose-only perp/bracket
#                           # basis strategy over the ladder below.
# perp_market = "KXBTCPERP"           # the perp whose PerpTick triggers the basis
# fee_floor_dollars = 4.0             # post-promo round-trip fee floor (dollars)
# min_basis_dollars = 1.0             # extra edge margin; basis must clear floor+margin
# edge_premium_cents = 2              # honest fair-value premium over the join limit
# # The bracket LADDER: each KXBTC bracket market id -> its strike kind (dollars).
# # The venue Market type carries no strikes, so the operator declares them here.
# [perp_event_basis.ladder."KXBTC-LO"]    # open bottom tail: P(BTC <= cap)
# kind = "less"
# cap_dollars = 60000.0
# [perp_event_basis.ladder."KXBTC-MID"]   # closed range: P(floor <= BTC < cap)
# kind = "between"
# floor_dollars = 60000.0
# cap_dollars = 70000.0
# [perp_event_basis.ladder."KXBTC-HI"]    # open top tail: P(BTC > floor)
# kind = "greater"
# floor_dollars = 70000.0

# --- Opt-in perp basis-v2 (§3.3) — the model-driven trader (default OFF) ----
# PRESENCE composes the v2 basis strategy AND spawns the funding-rates poller
# (the poller fills funding_rates_historical, which the per-segment resolve/score
# loop reads to grade funding_forecast vs the A2d baselines). v2 COEXISTS with
# rung-0 [perp_event_basis] above (v2 activates only on coherent, fresh inputs;
# rung-0 is the fallback) and is INERT until a PerpTick feed fires it — set
# `ticker_feed_jsonl` above for a Sim soak, or wire the live kinetics feed. The
# DC-1..DC-6 knobs below are the operator-ENDORSED conservative defaults (Sim-stage
# operating point, 2026-06-14); v2 stays DATA-ONLY/Sim (I7) — a DECLARED edge waits
# on the soak (funding CRPS must beat all four baselines; the EV gate must be
# net-positive over real fills). Omit any knob to take its default; uncomment to tune.
#
# [perp_event_basis_v2]
# perp_market = "KXBTCPERP"            # the perp whose PerpTick triggers v2 (BRTI anchor)
# # DC-1 — vol estimator (σ): how wide the settlement cone is.
# vol_buf_len     = 64                 # bounded BRTI-anchor ring capacity
# ewma_lambda     = 0.94               # EWMA decay λ for log-return variance (RiskMetrics)
# min_vol_obs     = 20                 # min returns folded before σ is "ready" (else inert)
# sigma_floor     = 0.000001           # σ floor (strictly > 0)
# sigma_ceiling   = 5.0                # σ ceiling (bounds a pathological vol spike)
# # DC-5 — ladder no-arb (A9): trust the quoted ladder only if it forms a valid CDF.
# no_arb_tol      = 0.05               # YES-sum tolerance (|Σ − 1| ≤ tol)
# # DC-4 — horizon regimes (A5): τ = the bracket's close_at − now.
# direct_max_ms       = 14400000       # ≤ 4h ⇒ Direct
# vol_adjusted_max_ms = 172800000      # 4–48h ⇒ VolAdjusted;  > 48h ⇒ Disabled (veto)
# max_anchor_age_ms   = 5000           # A6 stale-BRTI-anchor veto age (BRTI ~1/sec)
# # DC-3 — EV gate (A4/A8): how much edge a trade must show after costs.
# ev_threshold    = 0.02               # strict EV bar (probability-units)
# slippage        = 0.005              # ½-tick slippage margin
# reserve         = 0.01               # reserve margin
# adverse         = 0.01               # baseline maker adverse-selection (A7 raises it)
# fee_coeff       = 0.0175             # Kalshi quadratic maker fee coeff (the FEE-TRAP rate)
# # DC-6 — informativeness (A7): measure, don't assume, that the perp leads.
# info_max_age_ms            = 5000    # a quote older than this is STALE
# info_adverse_penalty       = 0.02    # adverse down-weight when Unfavorable
# info_veto_on_bracket_leads = true    # veto a bin the bracket strictly leads (fresher+tighter)
# # The bracket LADDER (REQUIRED; same shape as rung-0 — the venue Market carries no
# # strikes, so declare them here). Each KXBTC bracket id -> its strike kind (dollars).
# [perp_event_basis_v2.ladder."KXBTC-LO"]    # open bottom tail: P(BTC <= cap)
# kind = "less"
# cap_dollars = 60000.0
# [perp_event_basis_v2.ladder."KXBTC-MID"]   # closed range: P(floor <= BTC < cap)
# kind = "between"
# floor_dollars = 60000.0
# cap_dollars = 70000.0
# [perp_event_basis_v2.ladder."KXBTC-HI"]    # open top tail: P(BTC > floor)
# kind = "greater"
# floor_dollars = 70000.0

# --- Opt-in persona analysis (default OFF) ---------------------------------
# PRESENCE with enabled = true wires the persona-analysis step into the live
# loop: on a segment it reads the signals each persona reads, runs one
# orchestrator pass (the §4 firewall + cost budget + schema validation live
# inside), persists each produced analysis to domain_analyses, and fans it out
# to beliefs (attributed to the "domain-analysis" strategy — see the zero-exposure
# per-strategy gate above; propose-only, I6/I7). The loader is FAIL-CLOSED: a
# persona.md whose hash != the active personas-registry row refuses to boot. Absent
# or enabled = false => the persona step never runs (the daemon is byte-identical).
# Uncomment to enable (register the persona in the personas table first).
#
# [personas]
# enabled              = false   # master switch; false => the loop is byte-identical to today
# debounce_ms          = 0       # PersonaTriggerGate coalescing window (a signal burst => one run)
# window_hours         = 48      # how far back recent_by_kind reads signals
# max_signals          = 200     # recent_by_kind LIMIT
# budget_cents_per_day = 500     # the persona discovery budget (cost throttle)
#
# # one block per registered persona; dir holds persona.md + schema.json.
# [[personas.persona]]
# id       = "meteorologist"
# dir      = "config/personas/meteorologist"
# cadences = []   # signal-driven only. A cadence is a STRUCT-VARIANT, e.g.
#                 #   cadences = [{ daily_at_hour_utc = { hour = 5 } }]
#                 # or
#                 #   cadences = [{ every_hours = { hours = 6 } }]
#                 # (an invalid hour like 99 is rejected at boot — Cadence::validate).

# --- Opt-in world-forward discovery (default OFF) --------------------------
# PRESENCE with enabled = true wires the WORLD-FORWARD discovery step into the
# live loop (spec 5.12): on a segment it reads the fresh signals of the listed
# kinds, runs one world_forward_discovery pass (the HARD daily cost cap + the
# unscoreable rule live inside — this loop is the first thing throttled under
# budget pressure), persists each synthesized candidate as a `watch:` event, and
# fans the SCOREABLE candidates out to zero-capital beliefs (attributed to the
# "world-forward" strategy; propose-only, I6/I7 — no capital touches them until a
# §11 promotion gate passes, an operator action). A candidate whose resolution
# source is NOT a checkable, enabled row in the source registry is UNSCOREABLE:
# excluded from watchlist counts and refused beliefs (no beliefs nobody can
# grade). Absent or enabled = false => the discovery step never runs (the daemon
# is byte-identical). Uncomment to enable.
#
# [discovery]
# enabled              = false   # master switch; false => the loop is byte-identical to today
# budget_cents_per_day = 500     # the world-forward daily cost cap (must be > 0 when enabled)
# window_hours         = 48      # how far back recent_by_kind reads signals
# max_signals          = 200     # recent_by_kind LIMIT
# signal_kinds         = ["aeolus.forecast", "news.headline"]  # the kinds the loop reads
# # --- market-back prefilter (the catalog is INERT in prod until T4.2 wires the live Kalshi catalog) ---
# category_allowlist   = ["weather"]  # only these venue-market categories are normalized
# min_volume_contracts = 100          # listings below this volume floor are skipped
# min_category_quality = 0.0          # min per-category calibration quality (0.0 = no check)
