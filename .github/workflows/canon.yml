# Canon drift guardrail (advisory).
#
# On promotion, this file lives at .github/workflows/canon.yml and runs the
# closed-set + invariant-coverage check. It is ADVISORY for now (continue-on-error):
# it reports drift in the PR without blocking, matching the operator decision while
# CI is still latent (no remote yet). Flip continue-on-error to false to make it a
# hard gate once S2/S3 tests are written and FINAL_REPORT.md is archived.
name: canon
on:
  pull_request:
  push:
    branches: [main]
jobs:
  canon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Canon drift check (closed set + invariant coverage)
        continue-on-error: true   # advisory; see header
        run: |
          chmod +x tools/check-canon.sh
          tools/check-canon.sh
