# Canon drift guardrail (blocking).
#
# Runs the closed-set + invariant-coverage check (tools/check-canon.sh). This is a
# HARD GATE: a failing check fails the job. It went blocking on 2026-06-22 once the
# canon was green (S2/S3/I5-parametric tests present, FINAL_REPORT.md archived) and
# check-canon.sh reported CANON OK. The check is filesystem/git only (no DB), so it
# runs cleanly on a fresh runner. A legitimate canon change updates canon.manifest
# and the CONSTITUTION invariant-to-test map in the same PR.
name: canon
on:
  pull_request:
  push:
    branches: [main]
jobs:
  canon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Canon drift check (closed set + invariant coverage)
        run: |
          chmod +x tools/check-canon.sh
          tools/check-canon.sh
