name: ci
on:
  push: { branches: [main] }
  pull_request: {}
jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fortuna
          POSTGRES_PASSWORD: fortuna
          POSTGRES_DB: fortuna_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fortuna"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://fortuna:fortuna@localhost:5432/fortuna_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: tests
        run: cargo test --workspace
      - name: invariant tests (must compile; ignored allowed until owning task)
        run: cargo test -p fortuna-invariants -- --list
      - name: dst corpus
        run: ./scripts/run-dst.sh ${DST_SEEDS:-2000}
  protected-dir-guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: flag changes to protected invariant tests
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base"...HEAD | grep '^crates/fortuna-invariants/'; then
            echo "::warning::PR touches PROTECTED crates/fortuna-invariants/ - operator review required (see CLAUDE.md)."
          fi
